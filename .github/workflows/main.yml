name: Python Script Workflow #

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  run-python-script:
    runs-on: ubuntu-latest # Specifies the runner environment

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4 # Checks out your repository code onto the runner

      - name: Setup Python environment
        uses: actions/setup-python@v5 # Configures the Python environment
        with:
          python-version: '3.10' # Specifies the Python version to use

      - name: Install dependencies (optional)
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt # Installs packages from a requirements.txt if present
          fi

      - name: Execute Python script
        run: python my_script.py # Runs your Python file using the 'run' keyword
